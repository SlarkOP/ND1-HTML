<!doctype html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interaktyvu - Stellar Guide</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/nd2-style.css" />
  </head>

  <body class="home-page">
    <div class="overlay"></div>

    <header class="main-header">
      <div class="container">
        <div class="logo">
          <a href="index.html">Stellar Guide</a>
        </div>
        <nav class="main-nav">
          <ul>
            <li><a href="index.html">Pagrindinis</a></li>
            <li><a href="planets.html">Planetos</a></li>
            <li><a href="gallery.html">Galerija</a></li>
            <li><a href="interactive.html" class="active">Viktorina</a></li>
            <li><a href="observations.html">Registracija</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main
      class="nd2-section d-flex justify-content-center align-items-center flex-column"
    >
      <div class="glass-card" style="max-width: 600px; width: 100%">
        <h2 class="text-center" style="color: var(--primary-color)">
          Kosmoso Viktorina
        </h2>
        <p class="text-center mb-4">
          Patikrinkite savo žinias apie saulės sistemą!
        </p>

        <div id="quiz-box">
          <h4 id="question-text" class="mb-3">Kraunamas klausimas...</h4>
          <div id="answers-container"></div>

          <button
            id="next-btn"
            class="btn btn-primary mt-3 w-100 d-none"
            onclick="nextQuestion()"
          >
            Kitas klausimas
          </button>
        </div>

        <div
          id="quiz-result"
          class="d-none text-center font-weight-bold p-3 rounded mt-3"
        ></div>

        <button
          id="restart-btn"
          class="btn btn-secondary mt-4 w-100 d-none"
          onclick="resetQuiz()"
        >
          Bandyti dar kartą
        </button>
      </div>
    </main>

    <footer class="main-footer">
      <div class="container footer-content">
        <div class="footer-info">
          <p>&copy; 2026 STELLAR GUIDE</p>
          <p>VILNIUS TECH | Interneto technologijos</p>
        </div>
        <div class="footer-author"></div>
      </div>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
